# docker-compose.yml
# Dev stack: PostgreSQL, Keycloak, Redis, MinIO, Redpanda, Mailpit
# NFR-01 baseline: docker compose up --wait target < 60s
# NFR-05: All images are pinned to @sha256 digests for reproducibility.

name: plexica-dev

volumes:
  postgres_data:
  minio_data:

services:
  postgres:
    image: postgres@sha256:fceb6f86328c36f2438fae3b851b0cc57c4a7e69a58c866d9ce24281f2cf0c9c
    # postgres:15-alpine — pinned 2026-03-31
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-plexica}
      POSTGRES_USER: ${POSTGRES_USER:-plexica}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-plexica} -d ${POSTGRES_DB:-plexica}']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # One-shot service: creates the 'keycloak' database inside the shared PostgreSQL
  # instance if it does not already exist. Runs on every 'docker compose up' but is
  # idempotent — the SELECT guard means it is a no-op when the DB already exists.
  # Keycloak depends on this service completing successfully before it starts.
  keycloak-db-init:
    image: postgres@sha256:fceb6f86328c36f2438fae3b851b0cc57c4a7e69a58c866d9ce24281f2cf0c9c
    # postgres:15-alpine — same pinned digest as the main postgres service
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-changeme}
    entrypoint:
      - /bin/sh
      - -c
      - |
        psql -h postgres -U "${POSTGRES_USER:-plexica}" -d "${POSTGRES_DB:-plexica}" -tc \
          "SELECT 1 FROM pg_database WHERE datname = 'keycloak'" | grep -q 1 \
        || psql -h postgres -U "${POSTGRES_USER:-plexica}" -d "${POSTGRES_DB:-plexica}" \
          -c "CREATE DATABASE keycloak"
    restart: 'no'
    deploy:
      resources:
        limits:
          memory: 64M

  keycloak:
    image: quay.io/keycloak/keycloak@sha256:09a381c715ab0b111835b70f2905955274843a219c6f27efb348e4d9f4086858
    # quay.io/keycloak/keycloak:26.0 — pinned 2026-03-31
    command: start-dev --import-realm
    depends_on:
      keycloak-db-init:
        condition: service_completed_successfully
    environment:
      # Persistent storage: use the shared PostgreSQL instance.
      # Realm data (including provisioned tenants) now survives container restarts.
      # To wipe all Keycloak state: docker compose down -v && docker compose up -d
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ${POSTGRES_USER:-plexica}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USER:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-changeme}
      KC_HEALTH_ENABLED: 'true'
      KC_METRICS_ENABLED: 'false'
      KC_HTTP_ENABLED: 'true'
      KC_HOSTNAME_STRICT: 'false'
    ports:
      - '${KEYCLOAK_PORT:-8080}:8080'
      # Management port 9000 is intentionally NOT exposed to the host.
      # It is used only by the healthcheck inside the container.
      # NOTE: host port 9000 is already taken by MinIO — do not expose 9000 here.
    volumes:
      - ./infra/keycloak:/opt/keycloak/data/import:ro
      - ./infra/keycloak/providers:/opt/keycloak/providers:ro
    deploy:
      resources:
        limits:
          memory: 1024M
    healthcheck:
      # Check Keycloak management health endpoint (/health/ready on port 9000).
      # KC_HEALTH_ENABLED=true exposes this endpoint; it returns UP only after the
      # JVM and HTTP server are fully initialised.
      # Realm import readiness is verified separately in CI (see ci.yml step 7).
      # NOTE: curl is NOT available in Keycloak 26 (ubi9-minimal base image).
      # Use bash /dev/tcp (built-in) to make a raw HTTP/1.0 request instead.
      test:
        - 'CMD'
        - '/bin/bash'
        - '-c'
        - >-
          exec 3<>/dev/tcp/localhost/9000 &&
          printf "GET /health/ready HTTP/1.0\r\nHost: localhost\r\nConnection: close\r\n\r\n" >&3 &&
          cat <&3 | grep -q UP
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 60s

  redis:
    image: redis@sha256:8b81dd37ff027bec4e516d41acfbe9fe2460070dc6d4a4570a2ac5b9d59df065
    # redis:7-alpine — pinned 2026-03-31
    ports:
      - '${REDIS_PORT:-6379}:6379'
    deploy:
      resources:
        limits:
          memory: 128M
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  minio:
    image: minio/minio@sha256:4c4a4876193f030c81f57aabb22bcb9a73462010eb61fcab66908e03e5484af8
    # minio/minio:RELEASE.2024-01-16T16-07-38Z — pinned 2026-03-31
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-changeme}
    ports:
      - '${MINIO_PORT:-9000}:9000'
      - '${MINIO_CONSOLE_PORT:-9001}:9001'
    volumes:
      - minio_data:/data
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda@sha256:342d52b03d70e8c605897b1756d6faab14067af6f8a969264093dabbce1858dd
    # docker.redpanda.com/redpandadata/redpanda:v23.3.5 — pinned 2026-03-31
    command:
      - redpanda start
      - --smp 1
      - --memory 256M
      - --overprovisioned
      - --set redpanda.developer_mode=true
      - --kafka-addr PLAINTEXT://0.0.0.0:9092,OUTSIDE://0.0.0.0:19092
      - --advertise-kafka-addr PLAINTEXT://redpanda:9092,OUTSIDE://localhost:19092
      - --pandaproxy-addr 0.0.0.0:8082
      - --advertise-pandaproxy-addr localhost:8082
    ports:
      - '${REDPANDA_KAFKA_PORT:-19092}:19092'
      - '${REDPANDA_ADMIN_PORT:-9644}:9644'
    deploy:
      resources:
        limits:
          memory: 320M
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:9644/v1/brokers | grep -q ''"node_id"''']
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 20s

  redpanda-init:
    image: docker.redpanda.com/redpandadata/redpanda@sha256:342d52b03d70e8c605897b1756d6faab14067af6f8a969264093dabbce1858dd
    # Same image as redpanda — rpk is included. Runs once to provision core topics.
    depends_on:
      redpanda:
        condition: service_healthy
    entrypoint: /bin/sh
    command:
      - -c
      - |
        rpk --brokers redpanda:9092 topic create \
          plexica.tenant.events \
          plexica.user.events \
          plexica.plugin.events \
          --partitions 1 \
          --replicas 1 \
          --topic-config "retention.ms=604800000" || true
    restart: 'no'
    deploy:
      resources:
        limits:
          memory: 64M

  mailpit:
    image: axllent/mailpit@sha256:c5a6d0ba4d08187f70f305471da5fd9ad424fdfc2f25a2308226a786335dfa9f
    # axllent/mailpit:v1.29.5 — pinned 2026-03-31
    ports:
      - '${SMTP_PORT:-1025}:1025'
      - '${SMTP_UI_PORT:-8025}:8025'
    deploy:
      resources:
        limits:
          memory: 64M
    healthcheck:
      test: ['CMD-SHELL', 'wget -q --spider http://localhost:8025 || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
