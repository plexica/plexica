<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plexica</title>

    <!-- T005-15: Content Security Policy — font-src 'self' (ADR-020)
         connect-src includes %VITE_API_ORIGIN% so production deployments
         can set VITE_API_ORIGIN=https://api.example.com and have the CSP
         permit XHR/fetch calls to the API server.  In development the
         Vite dev-server proxy rewrites /api/* to localhost:3000 so
         connect-src 'self' alone suffices; the placeholder evaluates to
         an empty string when the env var is not set, which is harmless. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: https:; connect-src 'self' %VITE_API_ORIGIN%"
    />

    <!-- T005-15: Preload default fonts (Inter 400, Roboto 400) for instant first render -->
    <link
      rel="preload"
      href="/fonts/inter/inter-400.woff2"
      as="font"
      type="font/woff2"
      crossorigin="anonymous"
    />
    <link
      rel="preload"
      href="/fonts/roboto/roboto-400.woff2"
      as="font"
      type="font/woff2"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <!-- T010-32: Skip-to-content link moved to AppLayout.tsx (A11Y-S01).
         React sr-only/focus:not-sr-only pattern replaces inline-JS approach. -->
    <div id="root"></div>

    <!-- T005-21: Noscript fallback -->
    <noscript>
      <div
        style="
          display: flex;
          align-items: center;
          justify-content: center;
          height: 100vh;
          font-family: sans-serif;
          text-align: center;
          padding: 2rem;
        "
      >
        <div>
          <h1 style="font-size: 1.5rem; margin-bottom: 0.5rem">JavaScript required</h1>
          <p style="color: #666">
            Plexica requires JavaScript to run. Please enable JavaScript in your browser settings
            and reload the page.
          </p>
        </div>
      </div>
    </noscript>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
