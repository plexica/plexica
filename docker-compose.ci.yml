# docker-compose.ci.yml
# CI override for GitHub Actions. Tighter memory limits to fit GitHub Actions runner (7GB total).
# Port bindings are inherited from docker-compose.yml — tests connect via localhost.

name: plexica-ci

services:
  postgres:
    deploy:
      resources:
        limits:
          memory: 384M

  keycloak:
    deploy:
      resources:
        limits:
          memory: 768M

  redis:
    deploy:
      resources:
        limits:
          memory: 96M

  minio:
    deploy:
      resources:
        limits:
          memory: 192M

  redpanda:
    deploy:
      resources:
        limits:
          memory: 320M

  mailhog:
    deploy:
      resources:
        limits:
          memory: 48M
