# .github/actions/docker-infra/action.yml
# Composite action: cache, pull, start and verify all Docker infrastructure
# services required by CI (Postgres, Keycloak, Redis, MinIO, Redpanda, Mailpit)
# and ensure Redpanda topics are created with the correct retention policy.
#
# Extracted from ci.yml to keep that file ≤ 200 lines (Constitution Rule 4).
#
# phase input controls two-phase execution (OPT-3):
#   start — cache + pull/load + `docker compose up -d` (returns immediately)
#   wait  — wait for healthy + Redpanda topics + health verification
#   full  — start + wait combined (default, backward-compatible)

name: Start Docker infrastructure
description: >
  Pull (or restore from cache), start, and health-check all Plexica
  infrastructure containers. Also creates required Redpanda topics.

inputs:
  postgres-db:
    description: PostgreSQL database name
    default: plexica
  postgres-user:
    description: PostgreSQL user
    default: plexica
  postgres-password:
    description: PostgreSQL password
    default: changeme
  keycloak-admin-user:
    description: Keycloak admin username
    default: admin
  keycloak-admin-password:
    description: Keycloak admin password
    default: changeme
  phase:
    description: >
      Execution phase. One of: start | wait | full.
      Use "start" to launch containers in the background while other steps
      (lint, typecheck, build) run concurrently. Then call again with "wait"
      to block until all services are healthy before running tests.
      "full" (default) runs both phases sequentially for backward compatibility.
    default: full

runs:
  using: composite
  steps:
    # ── Pre-start cleanup ────────────────────────────────────────────────────
    # On self-hosted runners, previous CI runs or the dev stack may leave
    # containers running that occupy CI ports (5432, 6379, 8080, 9000, etc.)
    # Tear down any existing plexica-ci stack and any other container using
    # these ports to ensure a clean start.
    - name: Clean up conflicting containers
      if: inputs.phase == 'start' || inputs.phase == 'full'
      shell: bash
      run: |
        # 1. Tear down any lingering CI stack from a previous run
        docker compose -f docker-compose.yml -f docker-compose.ci.yml down --remove-orphans 2>/dev/null || true
        
        # 2. Kill any container occupying CI-required host ports (5432, 6379,
        #    8080, 9000, 19092, 1025, 3100, 3301, 9644, 8025)
        for PORT in 5432 6379 8080 9000 19092 1025 3100 3301 9644 8025; do
          CONTAINER=$(docker ps -q --filter "publish=$PORT" 2>/dev/null || true)
          if [ -n "$CONTAINER" ]; then
            echo "Stopping container $CONTAINER (occupies port $PORT)"
            docker stop "$CONTAINER" 2>/dev/null || true
            docker rm "$CONTAINER" 2>/dev/null || true
          fi
        done

    # ── Docker image cache (GitHub-hosted runners only) ──────────────────────
    # Images are pinned to SHA256 digests in docker-compose.yml.
    # Cache key is the hash of that file — invalidated only when digests change.
    # restore-keys allows a partial cache hit on a stale tar (avoids full re-pull).
    # On cache hit: docker load (~5s).  On cache miss: pull + save for next run.
    #
    # NOTE: on self-hosted runners, Docker's local layer cache persists between
    # runs, so the tar cache is unnecessary. Moreover, actions/cache@v5 extracts
    # tar entries using paths relative to the workspace, which fails when the
    # cache path is /tmp/… (../../../../../tmp cannot be resolved with the
    # runner's permissions). We skip caching on self-hosted runners entirely.
    - name: Cache Docker images
      id: docker-cache
      if: (inputs.phase == 'start' || inputs.phase == 'full') && runner.environment != 'self-hosted'
      uses: actions/cache@v5
      with:
        path: /tmp/docker-images
        key: docker-images-${{ hashFiles('docker-compose.yml') }}
        restore-keys: docker-images-

    - name: Restore Docker images from cache
      if: (inputs.phase == 'start' || inputs.phase == 'full') && steps.docker-cache.outputs.cache-hit == 'true'
      shell: bash
      run: docker load -i /tmp/docker-images/images.tar

    - name: Pull Docker images
      if: (inputs.phase == 'start' || inputs.phase == 'full') && (runner.environment == 'self-hosted' || steps.docker-cache.outputs.cache-hit != 'true')
      shell: bash
      run: docker compose -f docker-compose.yml -f docker-compose.ci.yml pull

    - name: Save Docker images to cache
      if: (inputs.phase == 'start' || inputs.phase == 'full') && runner.environment != 'self-hosted' && steps.docker-cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        mkdir -p /tmp/docker-images
        docker compose -f docker-compose.yml config --images \
          | sort -u \
          | xargs docker save -o /tmp/docker-images/images.tar

    # ── Start services ───────────────────────────────────────────────────────
    # phase=start: launch containers detached and return immediately so that
    # lint/typecheck/build can run in parallel while Docker warms up.
    # phase=full:  same launch, then falls through to the wait steps below.
    - name: Start infrastructure services (detached)
      if: inputs.phase == 'start' || inputs.phase == 'full'
      shell: bash
      env:
        POSTGRES_DB: ${{ inputs.postgres-db }}
        POSTGRES_USER: ${{ inputs.postgres-user }}
        POSTGRES_PASSWORD: ${{ inputs.postgres-password }}
        KEYCLOAK_ADMIN_USER: ${{ inputs.keycloak-admin-user }}
        KEYCLOAK_ADMIN_PASSWORD: ${{ inputs.keycloak-admin-password }}
      run: |
        # Start all long-running services detached (no --wait).
        # Returns immediately — healthchecks are polled in the wait phase.
        # redpanda-init is excluded here: it is a one-shot container handled
        # separately in the wait phase.
        docker compose -f docker-compose.yml -f docker-compose.ci.yml \
          up -d \
          postgres keycloak redis minio redpanda mailpit

    # ── Wait for services to be healthy ─────────────────────────────────────
    # phase=wait: called after lint/typecheck/build; blocks until healthy.
    # phase=full: falls through here immediately after start.
    - name: Wait for infrastructure services to be healthy
      if: inputs.phase == 'wait' || inputs.phase == 'full'
      shell: bash
      env:
        POSTGRES_DB: ${{ inputs.postgres-db }}
        POSTGRES_USER: ${{ inputs.postgres-user }}
        POSTGRES_PASSWORD: ${{ inputs.postgres-password }}
        KEYCLOAK_ADMIN_USER: ${{ inputs.keycloak-admin-user }}
        KEYCLOAK_ADMIN_PASSWORD: ${{ inputs.keycloak-admin-password }}
      run: |
        # --wait on already-running containers: Docker polls until all are
        # healthy or the timeout is reached. Near-instant if already healthy.
        docker compose -f docker-compose.yml -f docker-compose.ci.yml \
          up -d --wait --wait-timeout 300 \
          postgres keycloak redis minio redpanda mailpit

        # One-shot container: start, then block until it exits.
        # --wait cannot be used for one-shot containers (exits 1 even on clean
        # exit), so we use `docker wait` to capture the exit code explicitly.
        docker compose -f docker-compose.yml -f docker-compose.ci.yml \
          up -d redpanda-init
        EXIT_CODE=$(docker wait plexica-ci-redpanda-init-1)
        if [ "$EXIT_CODE" != "0" ]; then
          echo "redpanda-init failed with exit code $EXIT_CODE" >&2
          docker logs plexica-ci-redpanda-init-1 >&2
          exit 1
        fi
        echo "redpanda-init completed successfully."

    - name: Show Keycloak startup logs on failure
      if: failure()
      shell: bash
      run: docker logs plexica-ci-keycloak-1 2>&1 | tail -100 || true

    # ── Redpanda topics ──────────────────────────────────────────────────────
    - name: Ensure Redpanda topics exist with correct config
      if: inputs.phase == 'wait' || inputs.phase == 'full'
      shell: bash
      run: |
        RETENTION_MS=$((7 * 24 * 60 * 60 * 1000))
        for TOPIC in plexica.tenant.events plexica.user.events plexica.plugin.events; do
          # Create if not already present (redpanda-init normally handles this,
          # but this step is the authoritative CI gate — || true is intentional).
          docker exec plexica-ci-redpanda-1 rpk topic create "$TOPIC" \
            --brokers localhost:9092 \
            --partitions 1 \
            --replicas 1 || true
          # Idempotently apply retention policy regardless of creation order.
          docker exec plexica-ci-redpanda-1 rpk topic alter-config "$TOPIC" \
            --set "retention.ms=${RETENTION_MS}" \
            --brokers localhost:9092
        done
        docker exec plexica-ci-redpanda-1 rpk topic list --brokers localhost:9092

    # ── Health verification ──────────────────────────────────────────────────
    - name: Verify all services are healthy
      if: inputs.phase == 'wait' || inputs.phase == 'full'
      shell: bash
      run: |
        docker compose ps
        docker compose -f docker-compose.yml -f docker-compose.ci.yml ps --format json | \
          python3 -c "import sys,json; [print(s['Name'], s['Health']) for s in json.load(sys.stdin)]" || true
