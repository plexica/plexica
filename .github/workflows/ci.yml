# ci.yml — Plexica v2 CI pipeline
# Runs on every PR targeting main.
# Constitution Rule 2: all stages must pass; failure blocks merge.
#
# Stages (optimized order — Docker warms up in parallel with lint/build):
#   1. Setup        — checkout, Node, pnpm cache
#   2. Install      — pnpm install
#   2b. Generate    — prisma generate (TypeScript client)
#   3. Infra-start  — Docker cache/pull/`up -d` (detached, returns immediately)
#   4. Lint         — eslint              ┐ run while Docker is warming up
#   5. Typecheck    — tsc --noEmit        │
#   6. Build        — pnpm build          ┘
#   7. Infra-wait   — block until all services are healthy + topics created
#   8. Migrate      — apply Prisma migrations
#   9. Unit + Integration tests — Vitest (real services)
#  10. E2E          — Playwright Chromium smoke test (browser cached)
#  11. Teardown     — docker compose down (always runs)

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  # Use CI-friendly defaults pointing to Docker service names
  NODE_ENV: test
  DATABASE_URL: postgresql://plexica:changeme@localhost:5432/plexica
  KEYCLOAK_URL: http://localhost:8080
  KEYCLOAK_ADMIN_USER: admin
  KEYCLOAK_ADMIN_PASSWORD: changeme
  KC_HEALTH_ENABLED: 'true'
  KC_METRICS_ENABLED: 'false'
  KC_HTTP_ENABLED: 'true'
  KC_HOSTNAME_STRICT: 'false'
  REDIS_URL: redis://localhost:6379
  MINIO_ENDPOINT: http://localhost:9000
  MINIO_ACCESS_KEY: minioadmin
  MINIO_SECRET_KEY: changeme
  KAFKA_BROKERS: localhost:19092

jobs:
  ci:
    name: Build, Test, and Validate
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read # Minimum required for checkout; all other permissions denied

    steps:
      # ── 1. Setup ──────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10
          run_install: false

      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      # ── 2. Install ────────────────────────────────────────────────────────────
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── 2b. Generate Prisma client ────────────────────────────────────────────
      # Must run before lint/typecheck/build — @prisma/client types are generated here.
      # Does NOT require a running database (reads schema.prisma only).
      - name: Generate Prisma client
        run: pnpm --filter core-api db:generate

      # ── 2c. Build Keycloak theme JAR ──────────────────────────────────────────
      # Build and copy the JAR to infra/keycloak/providers/ BEFORE Docker starts.
      # Keycloak loads provider JARs at startup — if Docker starts first it loads
      # the stale committed JAR and won't reload it after pnpm build (step 6).
      - name: Build Keycloak theme JAR
        run: pnpm --filter @plexica/keycloak-theme build

      # ── 3. Infra start (detached) ─────────────────────────────────────────────
      # Launch Docker containers in the background (phase=start). Returns as soon
      # as `docker compose up -d` exits — healthchecks run asynchronously.
      # Lint, typecheck, and build execute while Keycloak (~60-120s) warms up,
      # recovering 2-3 min of wall-clock time per run.
      - name: Start Docker infrastructure (detached)
        uses: ./.github/actions/docker-infra
        with:
          phase: start
          postgres-db: plexica
          postgres-user: plexica
          postgres-password: changeme
          keycloak-admin-user: admin
          keycloak-admin-password: changeme

      # ── 4. Lint ───────────────────────────────────────────────────────────────
      - name: Lint
        run: pnpm lint

      # ── 5. Typecheck ──────────────────────────────────────────────────────────
      - name: Typecheck
        run: pnpm typecheck

      # ── 6. Build ──────────────────────────────────────────────────────────────
      - name: Build
        run: pnpm build

      # ── 7. Infra wait ─────────────────────────────────────────────────────────
      # Block until all services report healthy. If Docker is already ready
      # (lint+build took longer than Keycloak startup) this completes in seconds.
      # Also creates Redpanda topics and runs the health verification step.
      - name: Wait for Docker infrastructure to be healthy
        uses: ./.github/actions/docker-infra
        with:
          phase: wait
          postgres-db: plexica
          postgres-user: plexica
          postgres-password: changeme
          keycloak-admin-user: admin
          keycloak-admin-password: changeme

      # ── 8. Migrate ────────────────────────────────────────────────────────────
      - name: Apply database migrations
        run: pnpm --filter core-api db:migrate
        working-directory: ${{ github.workspace }}

      # ── 9. Unit + Integration tests ───────────────────────────────────────────
      - name: Run unit and integration tests
        run: pnpm --filter core-api test
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          KEYCLOAK_URL: ${{ env.KEYCLOAK_URL }}
          KEYCLOAK_ADMIN_USER: ${{ env.KEYCLOAK_ADMIN_USER }}
          KEYCLOAK_ADMIN_PASSWORD: ${{ env.KEYCLOAK_ADMIN_PASSWORD }}
          REDIS_URL: ${{ env.REDIS_URL }}
          MINIO_ENDPOINT: ${{ env.MINIO_ENDPOINT }}
          MINIO_ACCESS_KEY: ${{ env.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ env.MINIO_SECRET_KEY }}
          KAFKA_BROKERS: ${{ env.KAFKA_BROKERS }}

      # ── 10. E2E ────────────────────────────────────────────────────────────────
      # Download problem: cdn.playwright.dev throttles to ~135 KB/s on
      # GitHub-hosted runners (vs ~900 KB/s on a typical machine). Total
      # payload is ~285 MB (chromium 170 MB + headless-shell 112 MB + ffmpeg
      # 2 MB), which takes ~35 min on a single connection.
      #
      # Fix: aria2c with -x16 (16 parallel connections). If the CDN throttles
      # per-connection (not per-IP), this brings the download from ~35 min to
      # ~2-3 min. If throttling is per-IP, aria2c takes the same 35 min and we
      # fall back to the standard install. timeout-minutes: 50 ensures the job
      # never hangs longer than needed on the first run (cold cache).
      #
      # Cache strategy: restore/save as separate inline steps so the cache is
      # written immediately after installation, before E2E. Prevents the
      # failure mode where a cancelled job never triggers the post-job save.
      - name: Restore Playwright browsers cache
        id: playwright-cache
        uses: actions/cache/restore@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('apps/web/package.json') }}
          restore-keys: playwright-chromium-

      - name: Install Playwright Chromium
        id: install-playwright
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        timeout-minutes: 50
        run: |
          set -euo pipefail
          CACHE_DIR="$HOME/.cache/ms-playwright"
          BROWSERS_JSON="${GITHUB_WORKSPACE}/apps/web/node_modules/playwright-core/browsers.json"
          CDN="https://cdn.playwright.dev"

          # Read browser metadata from Playwright's browsers.json (version-agnostic)
          CHROME_VER=$(node -e "const b=require('${BROWSERS_JSON}');const c=b.browsers.find(x=>x.name==='chromium');console.log(c.browserVersion)")
          CHROME_REV=$(node -e "const b=require('${BROWSERS_JSON}');const c=b.browsers.find(x=>x.name==='chromium');console.log(c.revision)")
          HEADLESS_REV=$(node -e "const b=require('${BROWSERS_JSON}');const c=b.browsers.find(x=>x.name==='chromium-headless-shell');console.log(c.revision)")
          FFMPEG_REV=$(node -e "const b=require('${BROWSERS_JSON}');const c=b.browsers.find(x=>x.name==='ffmpeg');console.log(c.revision)")

          echo "Chromium ${CHROME_VER} (rev ${CHROME_REV}), headless-shell rev ${HEADLESS_REV}, ffmpeg rev ${FFMPEG_REV}"

          # Install system dependencies (fast: ~13s)
          pnpm --filter web exec playwright install-deps chromium

          # Attempt 1: aria2c with 16 parallel connections per file.
          # Bypasses per-connection CDN throttling. Expected: ~2-4 min.
          # Falls back to playwright install if aria2c fails or binaries are missing.
          mkdir -p /tmp/pw-dl
          ARIA_OK=true
          aria2c \
            --dir=/tmp/pw-dl \
            --max-connection-per-server=16 \
            --split=16 \
            --min-split-size=5M \
            --max-concurrent-downloads=3 \
            --retry-wait=5 \
            --max-tries=3 \
            --connect-timeout=30 \
            --timeout=120 \
            "${CDN}/builds/cft/${CHROME_VER}/linux64/chrome-linux64.zip" \
            "${CDN}/builds/cft/${CHROME_VER}/linux64/chrome-headless-shell-linux64.zip" \
            "${CDN}/builds/ffmpeg/${FFMPEG_REV}/ffmpeg-linux.zip" || ARIA_OK=false

          if [ "$ARIA_OK" = true ]; then
            echo "aria2c download succeeded — extracting..."
            mkdir -p "${CACHE_DIR}/chromium-${CHROME_REV}"
            mkdir -p "${CACHE_DIR}/chromium_headless_shell-${HEADLESS_REV}"
            mkdir -p "${CACHE_DIR}/ffmpeg-${FFMPEG_REV}"
            unzip -q /tmp/pw-dl/chrome-linux64.zip                  -d "${CACHE_DIR}/chromium-${CHROME_REV}/"
            unzip -q /tmp/pw-dl/chrome-headless-shell-linux64.zip    -d "${CACHE_DIR}/chromium_headless_shell-${HEADLESS_REV}/"
            unzip -q /tmp/pw-dl/ffmpeg-linux.zip                     -d "${CACHE_DIR}/ffmpeg-${FFMPEG_REV}/"
            chmod +x "${CACHE_DIR}/chromium-${CHROME_REV}/chrome-linux64/chrome"
            chmod +x "${CACHE_DIR}/chromium_headless_shell-${HEADLESS_REV}/chrome-headless-shell-linux64/chrome-headless-shell"
            # Marker files checked by Playwright runtime before launching a browser
            touch "${CACHE_DIR}/chromium-${CHROME_REV}/INSTALLATION_COMPLETE"
            touch "${CACHE_DIR}/chromium_headless_shell-${HEADLESS_REV}/INSTALLATION_COMPLETE"
            touch "${CACHE_DIR}/ffmpeg-${FFMPEG_REV}/INSTALLATION_COMPLETE"
            echo "Installation complete via aria2c:"
            ls "${CACHE_DIR}/"
          else
            # Fallback: standard playwright install (single-stream, ~35 min on cold runner)
            echo "aria2c failed — falling back to playwright install chromium"
            pnpm --filter web exec playwright install chromium
          fi

      - name: Save Playwright browsers cache
        if: steps.playwright-cache.outputs.cache-hit != 'true' && steps.install-playwright.conclusion == 'success'
        uses: actions/cache/save@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('apps/web/package.json') }}

      - name: Run Playwright E2E tests
        run: pnpm --filter web test:e2e
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          CI: 'true'
          # Raise the global rate-limit ceiling for E2E runs. The 120 tests in
          # the suite make many workspace POSTs from a single IP in rapid
          # succession; the default of 100 req/min is exhausted mid-suite,
          # causing 429s. 1000 req/min is still a meaningful guard against
          # runaway loops while allowing all tests to complete.
          RATE_LIMIT_MAX: '1000'
          # Infra vars — forwarded so the core-api webServer subprocess (started
          # by Playwright) can connect to all services. These are also set at the
          # job level (env:) but explicit forwarding ensures subprocess inheritance.
          DATABASE_URL: ${{ env.DATABASE_URL }}
          KEYCLOAK_URL: ${{ env.KEYCLOAK_URL }}
          KEYCLOAK_ADMIN_USER: ${{ env.KEYCLOAK_ADMIN_USER }}
          KEYCLOAK_ADMIN_PASSWORD: ${{ env.KEYCLOAK_ADMIN_PASSWORD }}
          REDIS_URL: ${{ env.REDIS_URL }}
          MINIO_ENDPOINT: ${{ env.MINIO_ENDPOINT }}
          MINIO_ACCESS_KEY: ${{ env.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ env.MINIO_SECRET_KEY }}
          KAFKA_BROKERS: ${{ env.KAFKA_BROKERS }}

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

      # ── 11. Teardown ──────────────────────────────────────────────────────────
      - name: Tear down infrastructure services
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml down -v --remove-orphans
