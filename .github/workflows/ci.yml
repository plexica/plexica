name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_ENV: test
  DATABASE_URL: postgresql://plexica:changeme@localhost:5432/plexica
  KEYCLOAK_URL: http://localhost:8080
  KEYCLOAK_ADMIN_USER: admin
  KEYCLOAK_ADMIN_PASSWORD: changeme
  KC_HEALTH_ENABLED: 'true'
  KC_METRICS_ENABLED: 'false'
  KC_HTTP_ENABLED: 'true'
  KC_HOSTNAME_STRICT: 'false'
  REDIS_URL: redis://localhost:6379
  MINIO_ENDPOINT: http://localhost:9000
  MINIO_ACCESS_KEY: minioadmin
  MINIO_SECRET_KEY: changeme
  KAFKA_BROKERS: localhost:19092
  LOKI_URL: http://localhost:3100

jobs:
  ci:
    name: Build, Test, and Validate
    runs-on: self-hosted
    timeout-minutes: 90
    permissions:
      contents: read
    steps:
      - name: Manual CI required for Dependabot PRs
        if: github.actor == 'dependabot[bot]'
        run: |
          BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          echo "::notice title=Dependabot ::Full CI must be triggered manually"
          echo "Run: gh workflow run ci.yml --ref ${BRANCH}"
          echo "This check must pass before the PR can merge."
          exit 1

      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Setup Node.js 24
        uses: actions/setup-node@v7
        with:
          node-version: '24'
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10
          run_install: false
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Verify authored-file line gate
        run: pnpm test:line-gate && pnpm check:lines
      - name: Generate Prisma client
        run: pnpm --filter core-api db:generate
      - name: Build Keycloak theme JAR
        run: pnpm --filter @plexica/keycloak-theme build

      - name: Start Docker infrastructure (detached)
        uses: ./.github/actions/docker-infra
        with:
          phase: start
          postgres-db: plexica
          postgres-user: plexica
          postgres-password: changeme
          keycloak-admin-user: admin
          keycloak-admin-password: changeme
      - name: Lint
        run: pnpm lint
      - name: Typecheck
        run: pnpm typecheck
      - name: Build
        run: pnpm -r --filter='!@plexica/plugin-crm' --filter='!plexica' run build
      - name: Admin app build (S5-C10)
        run: pnpm --filter @plexica/admin build
      - name: Wait for Docker infrastructure to be healthy
        uses: ./.github/actions/docker-infra
        with:
          phase: wait
          postgres-db: plexica
          postgres-user: plexica
          postgres-password: changeme
          keycloak-admin-user: admin
          keycloak-admin-password: changeme

      - name: Apply database migrations
        run: pnpm --filter core-api exec prisma migrate deploy
        working-directory: ${{ github.workspace }}
      - name: Verify migrations are complete and idempotent
        run: |
          pnpm --filter core-api exec prisma migrate deploy
          pnpm --filter core-api exec prisma migrate status
      - name: Run unit and integration tests
        run: pnpm --filter core-api test
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          KEYCLOAK_URL: ${{ env.KEYCLOAK_URL }}
          KEYCLOAK_ADMIN_USER: ${{ env.KEYCLOAK_ADMIN_USER }}
          KEYCLOAK_ADMIN_PASSWORD: ${{ env.KEYCLOAK_ADMIN_PASSWORD }}
          REDIS_URL: ${{ env.REDIS_URL }}
          MINIO_ENDPOINT: ${{ env.MINIO_ENDPOINT }}
          MINIO_ACCESS_KEY: ${{ env.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ env.MINIO_SECRET_KEY }}
          KAFKA_BROKERS: ${{ env.KAFKA_BROKERS }}
          LOKI_URL: ${{ env.LOKI_URL }}

      - name: Clean up ports for Playwright
        run: bash .github/actions/docker-infra/scripts/cleanup-ports.sh 3000 3001 3002
      - name: Verify preinstalled Chrome
        run: google-chrome --version
      - name: Run Playwright E2E tests
        run: pnpm --filter web test:e2e
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          PLAYWRIGHT_BROWSER_CHANNEL: chrome
          CI: 'true'
          RATE_LIMIT_MAX: '1000'
          ADMIN_RATE_LIMIT_MAX: '1000'
          DATABASE_URL: ${{ env.DATABASE_URL }}
          KEYCLOAK_URL: ${{ env.KEYCLOAK_URL }}
          KEYCLOAK_ADMIN_USER: ${{ env.KEYCLOAK_ADMIN_USER }}
          KEYCLOAK_ADMIN_PASSWORD: ${{ env.KEYCLOAK_ADMIN_PASSWORD }}
          REDIS_URL: ${{ env.REDIS_URL }}
          MINIO_ENDPOINT: ${{ env.MINIO_ENDPOINT }}
          MINIO_ACCESS_KEY: ${{ env.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ env.MINIO_SECRET_KEY }}
          KAFKA_BROKERS: ${{ env.KAFKA_BROKERS }}
          LOKI_URL: ${{ env.LOKI_URL }}
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

      - name: Clean up ports for admin Playwright
        run: bash .github/actions/docker-infra/scripts/cleanup-ports.sh 3001 3002
      - name: Run admin Playwright E2E tests
        run: pnpm --filter @plexica/admin e2e
        env:
          PLAYWRIGHT_ADMIN_BASE_URL: http://localhost:3002
          PLAYWRIGHT_BROWSER_CHANNEL: chrome
          CI: 'true'
          RATE_LIMIT_MAX: '1000'
          ADMIN_RATE_LIMIT_MAX: '1000'
          DATABASE_URL: ${{ env.DATABASE_URL }}
          KEYCLOAK_URL: ${{ env.KEYCLOAK_URL }}
          KEYCLOAK_ADMIN_USER: ${{ env.KEYCLOAK_ADMIN_USER }}
          KEYCLOAK_ADMIN_PASSWORD: ${{ env.KEYCLOAK_ADMIN_PASSWORD }}
          REDIS_URL: ${{ env.REDIS_URL }}
          MINIO_ENDPOINT: ${{ env.MINIO_ENDPOINT }}
          MINIO_ACCESS_KEY: ${{ env.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ env.MINIO_SECRET_KEY }}
          KAFKA_BROKERS: ${{ env.KAFKA_BROKERS }}
          LOKI_URL: ${{ env.LOKI_URL }}
          PLAYWRIGHT_LOKI_URL: ${{ env.LOKI_URL }}
      - name: Upload admin Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: admin-playwright-report
          path: apps/admin/playwright-report/
          retention-days: 7

      - name: Tear down infrastructure services
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml down -v --remove-orphans
      - name: Clean up orphan processes
        if: always()
        run: |
          pkill -f "node.*plexica" 2>/dev/null || true
          bash .github/actions/docker-infra/scripts/cleanup-ports.sh 3000 3001 3002
