# ci.yml — Plexica v2 CI pipeline
# Runs on every PR targeting main.
# Constitution Rule 2: all stages must pass; failure blocks merge.
#
# Stages (in order):
#   1. Setup        — checkout, Node, pnpm cache
#   2. Install      — pnpm install
#   2b. Generate    — prisma generate (TypeScript client)
#   3. Lint         — eslint
#   4. Typecheck    — tsc --noEmit
#   5. Build        — pnpm build
#   6. Docker pull  — pull images (or restore from cache)
#   7. Docker up    — spin up all infrastructure services
#   8. Migrate      — apply Prisma migrations
#   9. Unit + Integration tests — Vitest (real services)
#  10. E2E          — Playwright Chromium smoke test
#  11. Teardown     — docker compose down (always runs)

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  # Use CI-friendly defaults pointing to Docker service names
  NODE_ENV: test
  DATABASE_URL: postgresql://plexica:changeme@localhost:5432/plexica
  KEYCLOAK_URL: http://localhost:8080
  KEYCLOAK_ADMIN_USER: admin
  KEYCLOAK_ADMIN_PASSWORD: changeme
  KC_HEALTH_ENABLED: 'true'
  KC_METRICS_ENABLED: 'false'
  KC_HTTP_ENABLED: 'true'
  KC_HOSTNAME_STRICT: 'false'
  REDIS_URL: redis://localhost:6379
  MINIO_ENDPOINT: http://localhost:9000
  MINIO_ACCESS_KEY: minioadmin
  MINIO_SECRET_KEY: changeme
  KAFKA_BROKERS: localhost:19092

jobs:
  ci:
    name: Build, Test, and Validate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Setup ──────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10
          run_install: false

      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      # ── 2. Install ────────────────────────────────────────────────────────────
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── 2b. Generate Prisma client ────────────────────────────────────────────
      # Must run before lint/typecheck/build — @prisma/client types are generated here.
      # Does NOT require a running database (reads schema.prisma only).
      - name: Generate Prisma client
        run: pnpm --filter core-api db:generate

      # ── 3. Lint ───────────────────────────────────────────────────────────────
      - name: Lint
        run: pnpm lint

      # ── 4. Typecheck ──────────────────────────────────────────────────────────
      - name: Typecheck
        run: pnpm typecheck

      # ── 5. Build ──────────────────────────────────────────────────────────────
      - name: Build
        run: pnpm build

      # ── 6. Docker image cache ─────────────────────────────────────────────────
      # Images are pinned to SHA256 digests in docker-compose.yml.
      # Cache key is the hash of that file — invalidated only when digests change.
      # On cache hit: docker load (~5s).  On cache miss: pull + save for next run.
      - name: Cache Docker images
        id: docker-cache
        uses: actions/cache@v4
        with:
          path: /tmp/docker-images
          key: docker-images-${{ hashFiles('docker-compose.yml') }}

      - name: Restore Docker images from cache
        if: steps.docker-cache.outputs.cache-hit == 'true'
        run: docker load -i /tmp/docker-images/images.tar

      - name: Pull Docker images
        if: steps.docker-cache.outputs.cache-hit != 'true'
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml pull

      - name: Save Docker images to cache
        if: steps.docker-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p /tmp/docker-images
          docker compose -f docker-compose.yml config --images \
            | sort -u \
            | xargs docker save -o /tmp/docker-images/images.tar

      # ── 7. Docker up ─────────────────────────────────────────────────────────
      - name: Start infrastructure services
        run: |
          # Phase 1: start and wait for all long-running services.
          # redpanda-init is intentionally excluded here — it is a one-shot container
          # that exits with code 0 on success. docker compose --wait treats any exited
          # container as unhealthy, so we handle it in a separate phase below.
          docker compose -f docker-compose.yml -f docker-compose.ci.yml \
            up -d --wait --wait-timeout 300 \
            postgres keycloak redis minio redpanda mailpit

          # Phase 2: run redpanda-init and wait for it to exit cleanly (code 0).
          docker compose -f docker-compose.yml -f docker-compose.ci.yml \
            up --wait --wait-timeout 60 redpanda-init
        env:
          POSTGRES_DB: plexica
          POSTGRES_USER: plexica
          POSTGRES_PASSWORD: changeme
          KEYCLOAK_ADMIN_USER: admin
          KEYCLOAK_ADMIN_PASSWORD: changeme

      - name: Show Keycloak startup logs on failure
        if: failure()
        run: docker logs plexica-ci-keycloak-1 2>&1 | tail -100 || true

      - name: Ensure Redpanda topics exist with correct config
        run: |
          RETENTION_MS=$((7 * 24 * 60 * 60 * 1000))
          for TOPIC in plexica.tenant.events plexica.user.events plexica.plugin.events; do
            # Create if not already present (redpanda-init normally handles this,
            # but this step is the authoritative CI gate — || true is intentional).
            docker exec plexica-ci-redpanda-1 rpk topic create "$TOPIC" \
              --brokers localhost:9092 \
              --partitions 1 \
              --replicas 1 || true
            # Idempotently apply retention policy regardless of creation order.
            docker exec plexica-ci-redpanda-1 rpk topic alter-config "$TOPIC" \
              --set "retention.ms=${RETENTION_MS}" \
              --brokers localhost:9092
          done
          docker exec plexica-ci-redpanda-1 rpk topic list --brokers localhost:9092

      - name: Wait for Keycloak realm import
        run: |
          echo "Waiting for plexica-test realm to be available..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/realms/plexica-test/.well-known/openid-configuration > /dev/null 2>&1; then
              echo "Realm plexica-test is ready."
              exit 0
            fi
            echo "  Realm not ready yet ($i/30), retrying in 5s..."
            sleep 5
          done
          echo "ERROR: Keycloak realm plexica-test not available after 150s." >&2
          exit 1

      - name: Verify all services are healthy
        run: |
          docker compose ps
          docker compose -f docker-compose.yml -f docker-compose.ci.yml ps --format json | \
            python3 -c "import sys,json; [print(s['Name'], s['Health']) for s in json.load(sys.stdin)]" || true

      # ── 8. Migrate ────────────────────────────────────────────────────────────
      - name: Apply database migrations
        run: pnpm --filter core-api db:migrate
        working-directory: ${{ github.workspace }}

      # ── 9. Unit + Integration tests ───────────────────────────────────────────
      - name: Run unit and integration tests
        run: pnpm --filter core-api test
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          KEYCLOAK_URL: ${{ env.KEYCLOAK_URL }}
          KEYCLOAK_ADMIN_USER: ${{ env.KEYCLOAK_ADMIN_USER }}
          KEYCLOAK_ADMIN_PASSWORD: ${{ env.KEYCLOAK_ADMIN_PASSWORD }}
          REDIS_URL: ${{ env.REDIS_URL }}
          MINIO_ENDPOINT: ${{ env.MINIO_ENDPOINT }}
          MINIO_ACCESS_KEY: ${{ env.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ env.MINIO_SECRET_KEY }}
          KAFKA_BROKERS: ${{ env.KAFKA_BROKERS }}

      # ── 10. E2E ────────────────────────────────────────────────────────────────
      - name: Install Playwright Chromium
        run: pnpm --filter web exec playwright install --with-deps chromium

      - name: Run Playwright E2E tests
        run: pnpm --filter web test:e2e
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          CI: 'true'

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

      # ── 11. Teardown ──────────────────────────────────────────────────────────
      - name: Tear down infrastructure services
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml down -v --remove-orphans
