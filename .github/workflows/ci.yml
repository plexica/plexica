# ci.yml — Plexica v2 CI pipeline
# Runs on every PR targeting main.
# Constitution Rule 2: all stages must pass; failure blocks merge.
#
# Stages (optimized order — Docker warms up in parallel with lint/build):
#   1. Setup        — checkout, Node, pnpm cache
#   2. Install      — pnpm install
#   2b. Generate    — prisma generate (TypeScript client)
#   3. Infra-start  — Docker cache/pull/`up -d` (detached, returns immediately)
#   4. Lint         — eslint              ┐ run while Docker is warming up
#   5. Typecheck    — tsc --noEmit        │
#   6. Build        — pnpm build          ┘
#   7. Infra-wait   — block until all services are healthy + topics created
#   8. Migrate      — apply Prisma migrations
#   9. Unit + Integration tests — Vitest (real services)
#  10. E2E          — Playwright Chromium smoke test (browser cached)
#  11. Teardown     — docker compose down (always runs)

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  # Use CI-friendly defaults pointing to Docker service names
  NODE_ENV: test
  DATABASE_URL: postgresql://plexica:changeme@localhost:5432/plexica
  KEYCLOAK_URL: http://localhost:8080
  KEYCLOAK_ADMIN_USER: admin
  KEYCLOAK_ADMIN_PASSWORD: changeme
  KC_HEALTH_ENABLED: 'true'
  KC_METRICS_ENABLED: 'false'
  KC_HTTP_ENABLED: 'true'
  KC_HOSTNAME_STRICT: 'false'
  REDIS_URL: redis://localhost:6379
  MINIO_ENDPOINT: http://localhost:9000
  MINIO_ACCESS_KEY: minioadmin
  MINIO_SECRET_KEY: changeme
  KAFKA_BROKERS: localhost:19092

jobs:
  ci:
    name: Build, Test, and Validate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read # Minimum required for checkout; all other permissions denied

    steps:
      # ── 1. Setup ──────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10
          run_install: false

      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      # ── 2. Install ────────────────────────────────────────────────────────────
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── 2b. Generate Prisma client ────────────────────────────────────────────
      # Must run before lint/typecheck/build — @prisma/client types are generated here.
      # Does NOT require a running database (reads schema.prisma only).
      - name: Generate Prisma client
        run: pnpm --filter core-api db:generate

      # ── 2c. Build Keycloak theme JAR ──────────────────────────────────────────
      # Build and copy the JAR to infra/keycloak/providers/ BEFORE Docker starts.
      # Keycloak loads provider JARs at startup — if Docker starts first it loads
      # the stale committed JAR and won't reload it after pnpm build (step 6).
      - name: Build Keycloak theme JAR
        run: pnpm --filter @plexica/keycloak-theme build

      # ── 3. Infra start (detached) ─────────────────────────────────────────────
      # Launch Docker containers in the background (phase=start). Returns as soon
      # as `docker compose up -d` exits — healthchecks run asynchronously.
      # Lint, typecheck, and build execute while Keycloak (~60-120s) warms up,
      # recovering 2-3 min of wall-clock time per run.
      - name: Start Docker infrastructure (detached)
        uses: ./.github/actions/docker-infra
        with:
          phase: start
          postgres-db: plexica
          postgres-user: plexica
          postgres-password: changeme
          keycloak-admin-user: admin
          keycloak-admin-password: changeme

      # ── 4. Lint ───────────────────────────────────────────────────────────────
      - name: Lint
        run: pnpm lint

      # ── 5. Typecheck ──────────────────────────────────────────────────────────
      - name: Typecheck
        run: pnpm typecheck

      # ── 6. Build ──────────────────────────────────────────────────────────────
      - name: Build
        run: pnpm build

      # ── 7. Infra wait ─────────────────────────────────────────────────────────
      # Block until all services report healthy. If Docker is already ready
      # (lint+build took longer than Keycloak startup) this completes in seconds.
      # Also creates Redpanda topics and runs the health verification step.
      - name: Wait for Docker infrastructure to be healthy
        uses: ./.github/actions/docker-infra
        with:
          phase: wait
          postgres-db: plexica
          postgres-user: plexica
          postgres-password: changeme
          keycloak-admin-user: admin
          keycloak-admin-password: changeme

      # ── 8. Migrate ────────────────────────────────────────────────────────────
      - name: Apply database migrations
        run: pnpm --filter core-api db:migrate
        working-directory: ${{ github.workspace }}

      # ── 9. Unit + Integration tests ───────────────────────────────────────────
      - name: Run unit and integration tests
        run: pnpm --filter core-api test
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          KEYCLOAK_URL: ${{ env.KEYCLOAK_URL }}
          KEYCLOAK_ADMIN_USER: ${{ env.KEYCLOAK_ADMIN_USER }}
          KEYCLOAK_ADMIN_PASSWORD: ${{ env.KEYCLOAK_ADMIN_PASSWORD }}
          REDIS_URL: ${{ env.REDIS_URL }}
          MINIO_ENDPOINT: ${{ env.MINIO_ENDPOINT }}
          MINIO_ACCESS_KEY: ${{ env.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ env.MINIO_SECRET_KEY }}
          KAFKA_BROKERS: ${{ env.KAFKA_BROKERS }}

      # ── 10. E2E ────────────────────────────────────────────────────────────────
      # Cache the Playwright browser binaries. The cache key is tied to the web
      # package.json (which pins the @playwright/test version). On a cache hit the
      # ~400 MB Chromium download is skipped entirely, saving ~1-2 min per run.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('apps/web/package.json') }}
          restore-keys: playwright-chromium-

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter web exec playwright install --with-deps chromium

      - name: Run Playwright E2E tests
        run: pnpm --filter web test:e2e
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          CI: 'true'
          # Raise the global rate-limit ceiling for E2E runs. The 120 tests in
          # the suite make many workspace POSTs from a single IP in rapid
          # succession; the default of 100 req/min is exhausted mid-suite,
          # causing 429s. 1000 req/min is still a meaningful guard against
          # runaway loops while allowing all tests to complete.
          RATE_LIMIT_MAX: '1000'
          # Infra vars — forwarded so the core-api webServer subprocess (started
          # by Playwright) can connect to all services. These are also set at the
          # job level (env:) but explicit forwarding ensures subprocess inheritance.
          DATABASE_URL: ${{ env.DATABASE_URL }}
          KEYCLOAK_URL: ${{ env.KEYCLOAK_URL }}
          KEYCLOAK_ADMIN_USER: ${{ env.KEYCLOAK_ADMIN_USER }}
          KEYCLOAK_ADMIN_PASSWORD: ${{ env.KEYCLOAK_ADMIN_PASSWORD }}
          REDIS_URL: ${{ env.REDIS_URL }}
          MINIO_ENDPOINT: ${{ env.MINIO_ENDPOINT }}
          MINIO_ACCESS_KEY: ${{ env.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ env.MINIO_SECRET_KEY }}
          KAFKA_BROKERS: ${{ env.KAFKA_BROKERS }}

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

      # ── 11. Teardown ──────────────────────────────────────────────────────────
      - name: Tear down infrastructure services
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml down -v --remove-orphans
