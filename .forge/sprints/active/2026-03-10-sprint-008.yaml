# ---------------------------------------------------------------------------
# Phase 3 (completion): API Endpoints — Metrics Proxy & Observability
# Sprint 008, Weeks 1-3 | 24 story points
# ---------------------------------------------------------------------------
#
# Objective: Implement all remaining ObservabilityService methods and register
# the full /api/v1/observability/* route set. T012-19 (Zod schemas) and
# T012-20 (getHealthSummary) were completed in Sprint 007.
#
# Parallelism note: T012-21, T012-22, T012-23, T012-24 can all run in
# parallel — they each add an independent method to observability.service.ts
# and have no intra-phase data dependencies. T012-25 (route registration)
# must wait for all four service methods. T012-26 and T012-46 can run in
# parallel once T012-25 is done.
# ---------------------------------------------------------------------------

stories:
  - id: 'T012-21'
    title: 'Implement ObservabilityService.queryPluginMetrics() — PromQL range query with plugin label injection, allowlist validation, 30-day range cap'
    phase: 3
    week: 1
    points: 5
    status: pending
    parallel: true
    dependencies: ['T012-02']
    tags: ['[FR-028]', 'service', 'observability', 'prometheus', 'promql', 'security']
    notes: >
      T012-19 (PromQL allowlist schema) must be done (Sprint 007) before this
      task begins. T012-02 (Prometheus config) must be running locally.
      Injects {plugin="<pluginId>"} label selector automatically to prevent
      cross-plugin data leakage.

  - id: 'T012-22'
    title: 'Implement ObservabilityService.getActiveAlerts() and getAlertHistory() — Prometheus alerts API, severity filter, 7-day history, pagination'
    phase: 3
    week: 1
    points: 3
    status: pending
    parallel: true
    dependencies: ['T012-11']
    tags: ['[FR-022]', '[FR-023]', 'service', 'observability', 'prometheus', 'alerting']
    notes: >
      T012-11 (Prometheus alert rules) must exist before testing alert queries
      locally. Both methods live in the same observability.service.ts file
      started by T012-20 in Sprint 007.

  - id: 'T012-23'
    title: 'Implement ObservabilityService.searchTraces() and getTrace() — Tempo HTTP search/detail API, nested span tree transformation'
    phase: 3
    week: 1
    points: 5
    status: pending
    parallel: true
    dependencies: ['T012-03']
    tags: ['[FR-030]', '[FR-031]', 'service', 'observability', 'tempo', 'tracing']
    notes: >
      T012-03 (Tempo config) must be running locally for integration testing.
      getTrace() builds a recursive parent→children span tree from Tempo's flat
      span list. TraceNotFoundError maps to HTTP 404 (Art. 6.2).

  - id: 'T012-24'
    title: 'Implement ObservabilityService.getPluginLogs() — Loki range query, LogQL allowlist validation, 24-hour range cap, log entry mapping'
    phase: 3
    week: 1
    points: 3
    status: pending
    parallel: true
    dependencies: ['T012-04']
    tags: ['[FR-018]', 'service', 'observability', 'loki', 'logs']
    notes: >
      T012-04 (Loki config) must be running locally for integration testing.
      LogQL filter allowlist (prefix check: must start with |=, |~, !=, !~)
      defined in T012-19 (Sprint 007 Zod schemas) must be applied here.

  - id: 'T012-25'
    title: 'Create observability-v1.ts — register all 7 observability endpoints under /api/v1/observability with super_admin auth, Zod validation, error mapping'
    phase: 3
    week: 2
    points: 5
    status: pending
    parallel: false
    dependencies: ['T012-19', 'T012-20', 'T012-21', 'T012-22', 'T012-23', 'T012-24']
    tags: ['[FR-024]', '[FR-036]', '[FR-037]', 'api', 'routes', 'fastify', 'auth']
    notes: >
      Gating dependency: all five ObservabilityService methods (T012-20 from
      Sprint 007, T012-21–T012-24 from this sprint) must be complete before
      T012-25. Maps ObservabilityBackendError → 502, InvalidQueryError → 400,
      InvalidTimeRangeError → 400, TraceNotFoundError → 404. All success
      responses wrapped in { data: ... } or { data: ..., pagination: ... }.

  - id: 'T012-26'
    title: 'Register observabilityRoutes in index.ts — wire /api/v1/observability prefix into Fastify app after auth middleware'
    phase: 3
    week: 2
    points: 1
    status: pending
    parallel: true
    dependencies: ['T012-25']
    tags: ['[FR-024]', 'wiring', 'index', 'fastify']
    notes: >
      Simple one-line registration. Can be done in parallel with T012-46
      once T012-25 is complete.

  - id: 'T012-46'
    title: 'Add OpenAPI/Swagger schema definitions for all 8 new endpoints (GET /metrics + 7 /api/v1/observability/* routes) — Constitution Art. 3.4.5'
    phase: 3
    week: 2
    points: 2
    status: pending
    parallel: true
    dependencies: ['T012-25']
    tags: ['[Art.3.4.5]', 'openapi', 'swagger', 'documentation', 'schemas']
    notes: >
      Uses Zod-to-JSON-schema conversion following the existing plugin-v1.ts
      pattern (lines 200+). Tags all endpoints as ["Observability"]. Includes
      example values for all query parameters. Can run in parallel with T012-26.

