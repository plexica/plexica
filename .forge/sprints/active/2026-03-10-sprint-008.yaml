# ---------------------------------------------------------------------------
# Risks
# ---------------------------------------------------------------------------

risks:
  - id: 'R007'
    title: 'Sprint 007/008 timeline overlap — Phase 3 tasks start before Phase 1+2 infrastructure is proven'
    description: >
      Sprint 008 starts 2026-03-10 but Sprint 007 (which delivers the
      infrastructure prerequisites: Prometheus, Tempo, Loki configs) does not
      end until 2026-03-21. If Sprint 007 Phase 1 infrastructure tasks slip,
      Sprint 008 service method implementations cannot be integration-tested
      locally.
    severity: medium
    mitigation: >
      Sprint 008 service methods (T012-21..T012-24) can be written with mocked
      HTTP clients (via nock/msw) during the overlap period. Full local
      integration testing can begin once Sprint 007 T012-01..T012-06 are
      complete (~week 1 of Sprint 007). Unit tests (T012-35 in Sprint 009)
      will use mocked backends regardless.
    affects_tasks: ['T012-21', 'T012-22', 'T012-23', 'T012-24']

  - id: 'R008'
    title: 'T012-25 is a critical path bottleneck — all 4 service methods must be complete first'
    description: >
      Route registration (T012-25) requires T012-20 (Sprint 007) plus all four
      new service methods (T012-21..T012-24 in Sprint 008). Any one of these
      blocking prevents route registration and delays Sprint 009 frontend
      integration.
    severity: medium
    mitigation: >
      T012-21..T012-24 are all independently parallelizable. With 2 engineers,
      they can be completed in ~3 days. T012-25 then has a clear 1-day path.
      T012-26 and T012-46 follow with no contention.
    affects_tasks: ['T012-25', 'T012-26']

