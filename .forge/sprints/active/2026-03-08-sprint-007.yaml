# ---------------------------------------------------------------------------
# Risks
# ---------------------------------------------------------------------------

risks:
  - id: 'R001'
    title: 'Docker Compose memory pressure with 5 new observability services'
    description: >
      Adding Prometheus (512MB), Tempo (256MB), Loki (256MB), Promtail (128MB),
      and Grafana (256MB) adds ~1.4GB to the development Docker Compose stack.
      Developer machines with < 16GB RAM may hit memory limits, causing
      OOM-killed containers or slow scrape cycles.
    severity: medium
    mitigation: >
      Memory limits are explicitly set in T012-01 per spec NFR-020/021/022.
      Provide a `docker-compose.observability.yml` override profile so developers
      can opt-in to the full stack. Document minimum 16GB RAM requirement in
      OBSERVABILITY.md (T012-45).
    affects_tasks: ['T012-01']

  - id: 'R002'
    title: 'OTel SDK monkey-patching must precede Fastify initialisation'
    description: >
      OpenTelemetry's http instrumentation monkey-patches Node.js's built-in
      `http` module. If `initTelemetry()` is called after Fastify loads, HTTP
      spans will be missing. T012-16 adds `import './lib/telemetry.js'` as the
      FIRST import in index.ts — any merge conflict or refactor that reorders
      imports will silently break distributed tracing.
    severity: high
    mitigation: >
      Add a unit test (T012-37) that verifies OTel SDK is started before the
      Fastify instance. Add a lint rule or comment guard to index.ts marking
      the telemetry import as import-order-sensitive. Document in ADR-026.
    affects_tasks: ['T012-12', 'T012-16']

  - id: 'R003'
    title: 'Prometheus file_sd targets file write race condition in tests'
    description: >
      PluginTargetsService writes to a path from `PROMETHEUS_TARGETS_PATH` env
      var. In CI, multiple test workers may attempt to write to the same default
      path `/etc/prometheus/targets/plugins.json` simultaneously if the env var
      is not isolated per worker. Atomic rename (tmp → final) reduces but does
      not eliminate this risk in environments without filesystem isolation.
    severity: medium
    mitigation: >
      T012-36 unit tests mock `fs/promises.rename` with `vi.mock` — no real
      filesystem writes in unit tests. Integration tests should set a unique
      `PROMETHEUS_TARGETS_PATH` per test run (e.g., `/tmp/test-targets-{uuid}.json`).
    affects_tasks: ['T012-09', 'T012-36']

  - id: 'R004'
    title: 'pnpm deduplication of prom-client between core-api and event-bus'
    description: >
      T012-17 adds `prom-client ^15.1.3` to `apps/core-api/package.json`.
      If pnpm resolves a different minor/patch version than the one in
      `packages/event-bus`, two separate `Registry` instances will exist,
      breaking `MetricsService.getMetrics()` merge logic.
    severity: medium
    mitigation: >
      Pin prom-client to the exact version used in packages/event-bus. Verify
      deduplication with `pnpm why prom-client` after running `pnpm install`.
      ADR-027 explicitly calls this out as the expected behaviour.
    affects_tasks: ['T012-07', 'T012-17']

  - id: 'R005'
    title: '8 new npm packages increase supply-chain attack surface'
    description: >
      Sprint 7 introduces 8 new production npm packages (7 @opentelemetry/*
      plus prom-client). Each carries a supply-chain risk per Constitution
      Art. 2.2 dependency policy.
    severity: low
    mitigation: >
      All 8 packages are approved via ADR-026 and ADR-027. pnpm audit must
      pass before merge. CI vulnerability scanning (Art. 5.4) will block
      any packages with critical/high CVEs. @opentelemetry/* packages are
      CNCF-graduated projects with >1M weekly downloads each.
    affects_tasks: ['T012-17']

  - id: 'R006'
    title: 'Promtail Docker socket mount may require elevated permissions in CI'
    description: >
      T012-05 requires Promtail to bind-mount `/var/run/docker.sock:ro` for
      Docker container auto-discovery (ADR-028). CI environments (e.g., GitHub
      Actions with rootless Docker or DinD) may not allow socket mounts, causing
      Promtail to fail to start in integration/E2E tests.
    severity: medium
    mitigation: >
      Promtail is infrastructure-only (not required for unit or integration
      tests). CI test pipeline uses `NullContainerAdapter` and does not run
      the full docker-compose stack. Document CI skip condition in OBSERVABILITY.md.
    affects_tasks: ['T012-05']

# ---------------------------------------------------------------------------
# Constraints & Notes
# ---------------------------------------------------------------------------

constraints:
  - >
    T012-17 (package installation) MUST run before T012-12 (telemetry.ts) as
    the OTel imports will fail to compile without the packages present.
  - >
    T012-16 (index.ts wiring) MUST be the final Phase 2 task. The telemetry
    import must be the very first import in index.ts — this is architecturally
    critical (OTel http module monkey-patching, per ADR-026 §4.1).
  - >
    Prometheus, Tempo, Loki are infrastructure dependencies for T012-20
    (ObservabilityService). These services must be running (via docker-compose)
    during local integration testing of Phase 3 tasks.
  - >
    No new PostgreSQL tables or Prisma migrations in this sprint. All
    observability data lands in Prometheus/Tempo/Loki (plan.md §2.1).
  - >
    Backward compatibility: existing `/api/v1/plugins` routes must not be
    modified structurally; T012-18 adds a new route to plugin-v1.ts only
    (Constitution Art. 1.2 §3).
  - >
    1 story point ≈ 2h focused engineering. 61 pts ≈ 122h total.
    Sprint duration: 2 weeks × 5 days × ~6h/day = ~60h per engineer.
    Requires 2 engineers working in parallel to hit target comfortably.
  - >
    Full test suite (T012-34 through T012-43) is deferred to Sprint 8.
    Sprint 7 delivers working infrastructure + implementation code;
    dedicated test tasks begin in week 3 (Sprint 8) once implementations
    stabilise. Individual tasks may include basic smoke tests inline.

