# ---------------------------------------------------------------------------
# Risks
# ---------------------------------------------------------------------------

risks:
  - id: 'R015-01'
    title: 'CodeQL re-scan (T015-44) may surface additional alerts not in the original 36'
    description: >
      If new code committed since the original scan introduced new CodeQL
      alerts, the re-scan may show more than 36 alerts (or different alerts).
      This would require additional remediation not in this sprint scope.
    severity: low
    mitigation: >
      Run CodeQL locally (or via act) early in the sprint to baseline current
      alert count before implementing fixes. Any net-new alerts found during
      T015-44 should be logged as new GitHub issues and deferred to a follow-up
      spec unless they are ERROR-severity.

  - id: 'R015-02'
    title: '@fastify/rate-limit plugin-scope registration may conflict with existing global rate-limit middleware'
    description: >
      apps/core-api may already register @fastify/rate-limit globally. Adding
      per-plugin registrations could result in double rate-limiting (reduced
      effective limits) or a Fastify duplicate-plugin error.
    severity: medium
    mitigation: >
      Read apps/core-api/src/app.ts and middleware/rate-limiter.ts before
      implementing T015-12 through T015-15. If global registration exists,
      use config: { rateLimit: { max: N } } on individual route handlers
      instead of plugin-scope re-registration. Document approach in PR.

  - id: 'R015-03'
    title: 'DOMPurify SSR incompatibility in Next.js or server-side rendering contexts'
    description: >
      DOMPurify v3 requires a DOM environment. If apps/web or apps/super-admin
      use SSR, DOMPurify.sanitize() will throw in the server context.
    severity: low
    mitigation: >
