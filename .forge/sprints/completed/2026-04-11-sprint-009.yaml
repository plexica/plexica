# ---------------------------------------------------------------------------
# Phase 4: Frontend Dashboard
# Sprint 009, Week 1 | 38 story points
# ---------------------------------------------------------------------------
#
# Objective: Build the Super Admin observability dashboard with Health, Metrics,
# Traces, and Alerts tabs inside apps/super-admin. All Phase 4 tasks depend on
# Sprint 008 (T012-25) delivering the full observability API.
#
# Parallelism note:
#   T012-27 (layout + nav) and T012-28 (React Query hooks) have no intra-phase
#   dependencies and can run in parallel from day one.
#   T012-29, T012-30, T012-31, T012-33 all depend on T012-28 and can then
#   run in parallel with each other.
#   T012-32 (SpanWaterfall) depends on T012-31 and is the most complex
#   individual task (8h).
#   T012-47 (feature flag) depends on T012-27 and is independent of T012-28+.
# ---------------------------------------------------------------------------

stories:
  # --- Phase 4 ---

  - id: 'T012-27'
    title: 'Install recharts, create ObservabilityPage with tab nav (Health|Metrics|Traces|Alerts), add Observability sidebar nav item with active-alerts badge'
    phase: 4
    week: 1
    points: 5
    status: done
    parallel: true
    dependencies: []
    tags: ['[FR-024]', '[NFR-018]', 'frontend', 'ui', 'recharts', 'navigation', '[ADR-029]']
    notes: >
      No backend dependency — page shell and nav can be wired before Sprint 008
      is complete. Tabs use TanStack Router query params (?tab=health|...).
      useActiveAlertsCount hook polls /api/v1/observability/alerts every 60s
      for the sidebar badge count.

  - id: 'T012-28'
    title: 'Create useObservability.ts — 8 React Query hooks for all observability API calls (useHealthSummary, usePluginMetrics, useActiveAlerts, useAlertHistory, useTraces, useTraceDetail, usePluginLogs, useActiveAlertsCount)'
    phase: 4
    week: 1
    points: 5
    status: done
    parallel: true
    dependencies: []
    tags: ['[FR-024]', 'hooks', 'react-query', 'frontend', 'api-client']
    notes: >
      Depends on Sprint 008 T012-25 for the API contract to be locked.
      Can be written against mocked API responses first; integration-validated
      once Sprint 008 is merged. staleTime and refetchInterval configured per
      spec (health: 30s, alerts: 60s). Uses existing apiClient from @plexica/api-client.

  - id: 'T012-47'
    title: 'Add observability_dashboard_enabled feature flag — gate sidebar nav item and /observability route (Constitution Art. 9.1)'
    phase: 4
    week: 1
    points: 2
    status: done
    parallel: false
    dependencies: ['T012-27']
    tags: ['[Art.9.1]', 'feature-flag', 'frontend', 'rollout']
    notes: >
      Follows existing admin_interfaces_enabled pattern. Default: true in dev,
      configurable via OBSERVABILITY_DASHBOARD_ENABLED env var. If disabled,
      nav item hidden and /observability route redirects to dashboard root.

  - id: 'T012-29'
    title: 'Create HealthStatusBadge (colour+text for WCAG 1.4.1) and HealthSummaryTable (sortable, keyboard-navigable, 30s auto-refresh with skeleton loading)'
    phase: 4
    week: 1
    points: 5
    status: done
    parallel: true
    dependencies: ['T012-28']
    tags: ['[FR-025]', '[NFR-019]', 'frontend', 'components', 'a11y', 'wcag']
    notes: >
      HealthStatusBadge uses colour AND icon/text (no colour-only, WCAG 1.4.1).
      Table must have aria-sort on sortable headers and be keyboard navigable.
      Clicking a row navigates to Metrics tab filtered to that plugin.
      Shows AutoRefreshIndicator with 30s countdown.

  - id: 'T012-30'
    title: 'Create MetricsChartPanel (4-panel recharts grid: request rate, latency P50/P95/P99, error rate, resources), TimeRangeSelector, AutoRefreshIndicator, AccessibleChartToggle (chart ↔ data table)'
    phase: 4
    week: 1
    points: 8
    status: done
    parallel: true
    dependencies: ['T012-28']
    tags:
      ['[FR-027]', '[NFR-018]', '[NFR-019]', 'frontend', 'charts', 'recharts', 'a11y', '[ADR-029]']
    notes: >
      Largest Phase 4 task (8h). Distinct dash patterns on chart lines — not
      just colours — for WCAG 1.4.1. AccessibleChartToggle switches between
      recharts SVG and HTML <table> fallback (ADR-029 requirement).
      Code-split via React.lazy per NFR-018. aria-label on all SVG charts.

  - id: 'T012-31'
    title: 'Create TraceSearchForm (service/traceId/time-range/limit inputs) and TraceResultsTable (paginated, status badge colour+icon, click-to-waterfall)'
    phase: 4
    week: 1
    points: 5
    status: done
    parallel: true
    dependencies: ['T012-28']
    tags: ['[FR-029]', '[FR-030]', 'frontend', 'components', 'traces', 'a11y']
    notes: >
      All form inputs have associated <label> elements (WCAG 4.1.2).
      Status badge uses colour + icon (not colour-only). Selected trace
      opens SpanWaterfall (T012-32) in adjacent panel or slide-over.

  - id: 'T012-32'
    title: 'Create SpanWaterfall (hierarchical span timeline, CSS-positioned, keyboard-navigable, error highlighting) and SpanDetailPanel (span attributes, copyable IDs)'
    phase: 4
    week: 2
    points: 8
    status: done
    parallel: false
    dependencies: ['T012-31']
    tags: ['[FR-029]', '[FR-031]', '[NFR-019]', 'frontend', 'components', 'traces', 'a11y']
    notes: >
      Most complex Phase 4 component (8h estimated). Custom CSS-positioned
      waterfall — no Grafana embed. Arrow key navigation between span rows.
      Error spans highlighted with aria-label="Error span". SpanDetailPanel
      has role="complementary" and copyable span/trace IDs. Mobile: horizontal
      scroll (NFR-018 breakpoints).

  - id: 'T012-33'
    title: 'Create ActiveAlertCard (severity badge colour+text, role="alert" for critical) and AlertHistoryTable (paginated, severity filter, "View Plugin" link)'
    phase: 4
    week: 2
    points: 5
    status: done
    parallel: true
    dependencies: ['T012-28']
    tags: ['[FR-032]', 'frontend', 'components', 'alerts', 'a11y']
    notes: >
      Cards sorted by severity (critical first) then activeAt (oldest first).
      Empty state: green "All systems operational" message.
      AlertHistoryTable uses useAlertHistory(page, perPage) with pagination
      aria-labels. "View Plugin" link navigates to plugin detail page.

