# ---------------------------------------------------------------------------
# Risks
# ---------------------------------------------------------------------------

risks:
  - id: 'R009'
    title: 'Sprint 009 depends on both Sprint 007 and Sprint 008 being complete'
    description: >
      Sprint 009 frontend hooks (T012-28) require Sprint 008 T012-25
      (all observability routes registered) to validate against real endpoints.
      Sprint 009 test tasks (T012-34..T012-40) require Sprint 007 and 008
      implementations. Any slip in Sprint 007 or 008 directly delays Sprint 009.
    severity: high
    mitigation: >
      T012-27 (ObservabilityPage layout) and T012-28 (hooks, mocked initially)
      can start before Sprint 008 is complete. T012-29..T012-33 (components)
      can be built against mocked API data. Phase 5 test tasks for Sprint 007
      work (T012-34, T012-36, T012-37, T012-39, T012-40) can start immediately
      once Sprint 007 merges, during the Sprint 008 overlap window.
    affects_tasks: ['T012-28', 'T012-38', 'T012-41']

  - id: 'R010'
    title: 'T012-32 (SpanWaterfall) is the highest-risk frontend task — 8h estimate, custom CSS layout'
    description: >
      SpanWaterfall requires a custom CSS-positioned hierarchical timeline
      with keyboard navigation, error highlighting, and mobile horizontal
      scroll. This is the most novel UI component in the sprint with no
      existing internal reference implementation. The 8h estimate may be
      optimistic if the CSS positioning math for proportional duration bars
      proves complex.
    severity: medium
    mitigation: >
      Descope SpanWaterfall to a simplified flat list (not hierarchical tree)
      for MVP if blocked, deferring the indented tree layout to a follow-up
      task. The SpanDetailPanel can still render all span attributes.
      Keyboard navigation can be added as a fast-follow in Sprint 010.
    affects_tasks: ['T012-32', 'T012-41']

  - id: 'R011'
    title: '77 pts in 12 days requires sustained parallel execution'
    description: >
      The sprint target of 77 pts over 12 days requires 2 engineers working
      in parallel across Phase 4 (frontend) and Phase 5 (testing) tracks.
      With a single engineer, the realistic throughput is ~40–45 pts in
      12 days, which would require carrying T012-32, T012-41, and T012-43/44
      into Sprint 010.
    severity: medium
    mitigation: >
      If working solo: prioritise T012-27, T012-28, T012-29, T012-30 (core
      dashboard), T012-34, T012-35, T012-38 (core tests), T012-45 (docs).
      Defer T012-32 (SpanWaterfall), T012-41 (E2E), T012-43/44 (Grafana
      dashboards) to Sprint 010 as acceptable scope reduction.
    affects_tasks: ['T012-32', 'T012-41', 'T012-43', 'T012-44']

  - id: 'R012'
    title: 'WCAG compliance failures discovered late in T012-41 axe-core scan'
    description: >
      If @axe-core/playwright reports critical/serious violations in T012-41
      (the final E2E test task), fixing them may require retroactive changes
      to T012-29..T012-33 components. Late accessibility failures are costly.
    severity: medium
    mitigation: >
      All Phase 4 component tasks (T012-29..T012-33) explicitly specify
      WCAG requirements inline (aria-* attributes, colour+text badges,
      keyboard navigation). T012-29 and T012-30 should run axe-core
      component-level checks (vitest-axe per ADR-022) before T012-41.
      Constitution Art. 1.3 and Art. 4.2 block merge on WCAG violations.
    affects_tasks: ['T012-29', 'T012-30', 'T012-31', 'T012-32', 'T012-33', 'T012-41']

