volumes:
  minio_data:

services:
  redis:
    image: redis@sha256:8b81dd37ff027bec4e516d41acfbe9fe2460070dc6d4a4570a2ac5b9d59df065
    ports:
      - '${REDIS_PORT:-6379}:6379'
    deploy:
      resources:
        limits:
          memory: 128M
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  minio:
    image: minio/minio@sha256:4c4a4876193f030c81f57aabb22bcb9a73462010eb61fcab66908e03e5484af8
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-changeme}
    ports:
      - '${MINIO_PORT:-9000}:9000'
      - '${MINIO_CONSOLE_PORT:-9001}:9001'
    volumes:
      - minio_data:/data
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda@sha256:342d52b03d70e8c605897b1756d6faab14067af6f8a969264093dabbce1858dd
    command:
      - redpanda start
      - --smp 1
      - --memory 256M
      - --overprovisioned
      - --set redpanda.developer_mode=true
      - --kafka-addr PLAINTEXT://0.0.0.0:9092,OUTSIDE://0.0.0.0:19092
      - --advertise-kafka-addr PLAINTEXT://redpanda:9092,OUTSIDE://localhost:19092
      - --pandaproxy-addr 0.0.0.0:8082
      - --advertise-pandaproxy-addr localhost:8082
    ports:
      - '${REDPANDA_KAFKA_PORT:-19092}:19092'
      - '${REDPANDA_ADMIN_PORT:-9644}:9644'
    deploy:
      resources:
        limits:
          memory: 320M
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:9644/v1/brokers | grep -q ''"node_id"''']
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 20s

  redpanda-init:
    image: docker.redpanda.com/redpandadata/redpanda@sha256:342d52b03d70e8c605897b1756d6faab14067af6f8a969264093dabbce1858dd
    depends_on:
      redpanda:
        condition: service_healthy
    volumes:
      - ./infra/redpanda/ensure-topics.sh:/ensure-topics.sh:ro
    entrypoint: /bin/sh
    command: /ensure-topics.sh redpanda:9092
    restart: 'no'
    deploy:
      resources:
        limits:
          memory: 64M

  mailpit:
    image: axllent/mailpit@sha256:c5a6d0ba4d08187f70f305471da5fd9ad424fdfc2f25a2308226a786335dfa9f
    ports:
      - '${SMTP_PORT:-1025}:1025'
      - '${SMTP_UI_PORT:-8025}:8025'
    deploy:
      resources:
        limits:
          memory: 64M
    healthcheck:
      test: ['CMD-SHELL', 'wget -q --spider http://localhost:8025 || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
